name: Release and Publish

on:
  push:
    tags:
      - 'v*'  # 只在推送版本标签时触发，如 v1.0.0
  workflow_dispatch:  # 允许手动触发（用于测试发布）
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: false
        type: string
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Package VSIX
        run: npx vsce package --out mermaid-visual-editor-vscode.vsix
      
      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mermaid-visual-editor-vscode-vsix
          path: mermaid-visual-editor-vscode.vsix
          retention-days: 30
      
      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: mermaid-visual-editor-vscode.vsix
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
