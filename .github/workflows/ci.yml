name: CI Build and Test

on:
  push:
    tags:
      - 'v*'  # 只在推送版本标签时触发，如 v1.0.0
  workflow_dispatch:  # 允许手动触发（用于测试）
    inputs:
      test_build:
        description: 'Run test build'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint (optional)
        run: npm run lint || echo "Linting skipped - no ESLint configuration found"
        continue-on-error: true
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Verify build output
        run: |
          if [ ! -f "out/extension.js" ]; then
            echo "Error: extension.js not found in out directory"
            exit 1
          fi
          if [ ! -f "out/webview.js" ]; then
            echo "Error: webview.js not found in out directory"
            exit 1
          fi
          echo "Build successful!"
      
      - name: Package VSIX (test)
        run: npx vsce package --out test-extension.vsix
      
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-extension-vsix-${{ github.ref_name }}
          path: test-extension.vsix
          retention-days: 7
